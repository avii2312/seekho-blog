<!-- login.html -->
{% extends 'base.html' %}
{% block title %}Login — Seekho Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-5 col-lg-4">

    <div class="seekho-auth-card p-4 p-md-5">
        <h2 class="text-center mb-4">Log In</h2>

        <form method="post" action="{{ url_for('auth.login') }}">

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                    type="text"
                    class="form-control seekho-input"
                    id="username"
                    name="username"
                    value="{{ username if username is defined else '' }}"
                    required
                    autofocus
                />
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    class="form-control seekho-input"
                    id="password"
                    name="password"
                    required
                />
            </div>

            <button type="submit" class="btn btn-seekho w-100">Log In</button>

        </form>

        <p class="text-center mt-4 mb-0 text-muted">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Register here</a>
        </p>
    </div>

</div>
</div>
{% endblock %}
